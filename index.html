<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Выбор адреса</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1c1c1e; color: #fff;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    #hint {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.72); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      z-index: 100; white-space: nowrap; pointer-events: none;
      transition: opacity 0.4s;
    }
    #hint.hidden { opacity: 0; }
    #map { flex: 1; width: 100%; }
    #panel {
      background: #1c1c1e; padding: 12px 16px 16px;
      border-top: 1px solid #2c2c2e;
    }
    #address-box {
      background: #2c2c2e; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 12px;
      min-height: 52px; display: flex; align-items: center; gap: 10px;
    }
    #address-icon { font-size: 20px; flex-shrink: 0; }
    #address-text { font-size: 14px; line-height: 1.4; }
    #address-text.placeholder { color: #6e6e73; }
    #confirm-btn {
      width: 100%; padding: 14px;
      background: #FF5A00; color: #fff;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    #confirm-btn:disabled { background: #3a3a3c; color: #6e6e73; cursor: not-allowed; }
    #confirm-btn:not(:disabled):active { transform: scale(0.97); }
  </style>
</head>
<body>

<div id="hint">📍 Нажмите на карте чтобы выбрать место</div>
<div id="map"></div>

<div id="panel">
  <div id="address-box">
    <span id="address-icon">📍</span>
    <span id="address-text" class="placeholder">Нажмите на нужное место на карте</span>
  </div>
  <button id="confirm-btn" disabled>Подтвердить адрес</button>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey=98e9a644-14da-48f9-b740-a886e0b4fa82&lang=ru_RU"></script>
<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  let placemark = null;
  let selectedData = null;

  // Nominatim (OpenStreetMap) — работает из браузера без API-ключа и без CORS-проблем
  async function reverseGeocode(lat, lon) {
    try {
      const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru&zoom=18`;
      const resp = await fetch(url, {
        headers: { 'User-Agent': 'TelegramRentBot/1.0' }
      });
      if (!resp.ok) return null;
      const data = await resp.json();
      const a = data.address || {};
      const city    = a.city || a.town || a.village || a.suburb || '';
      const road    = a.road || a.pedestrian || a.footway || '';
      const house   = a.house_number || '';
      const address = [road, house].filter(Boolean).join(', ');
      return { city, address };
    } catch (e) {
      return null;
    }
  }

  ymaps.ready(function () {
    const map = new ymaps.Map('map', {
      center: [44.8951, 37.3168],
      zoom: 13,
      controls: ['zoomControl', 'searchControl'],
    });

    const search = map.controls.get('searchControl');
    search.events.add('resultselect', function () {
      search.getResult(0).then(function (res) {
        const coords = res.geometry.getCoordinates();
        setPin(coords);
        map.setCenter(coords, 16);
      });
    });

    map.events.add('click', function (e) {
      setPin(e.get('coords'));
    });

    async function setPin(coords) {
      document.getElementById('hint').classList.add('hidden');

      if (placemark) {
        placemark.geometry.setCoordinates(coords);
      } else {
        placemark = new ymaps.Placemark(coords, {}, {
          preset: 'islands#redDotIcon',
          draggable: true,
        });
        placemark.events.add('dragend', function () {
          setPin(placemark.geometry.getCoordinates());
        });
        map.geoObjects.add(placemark);
      }

      const lat = coords[0], lon = coords[1];
      selectedData = { lat, lon, city: '', address: '' };

      const addrEl = document.getElementById('address-text');
      addrEl.className = 'placeholder';
      addrEl.textContent = '⏳ Определяю адрес...';
      document.getElementById('confirm-btn').disabled = true;

      const result = await reverseGeocode(lat, lon);

      if (result && (result.city || result.address)) {
        selectedData.city    = result.city;
        selectedData.address = result.address;
        const display = [result.city, result.address].filter(Boolean).join(', ');
        addrEl.className = '';
        addrEl.textContent = display;
      } else {
        // Геокодинг не удался — бот определит адрес сам на сервере
        addrEl.className = 'placeholder';
        addrEl.textContent = 'Адрес будет определён автоматически';
      }

      document.getElementById('confirm-btn').disabled = false;
    }
  });

  document.getElementById('confirm-btn').addEventListener('click', function () {
    if (!selectedData) return;
    tg.sendData(JSON.stringify(selectedData));
  });
</script>
</body>
</html>
