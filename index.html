<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Выбор адреса</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1c1c1e; color: #fff;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    #hint {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.72); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      z-index: 100; white-space: nowrap; pointer-events: none;
      transition: opacity 0.4s;
    }
    #hint.hidden { opacity: 0; }
    #map { flex: 1; width: 100%; }
    #panel {
      background: #1c1c1e; padding: 12px 16px 16px;
      border-top: 1px solid #2c2c2e;
    }
    #address-box {
      background: #2c2c2e; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 12px;
      min-height: 52px; display: flex; align-items: center; gap: 10px;
    }
    #address-icon { font-size: 20px; flex-shrink: 0; }
    #address-text { font-size: 14px; line-height: 1.4; color: #ebebf5cc; }
    #address-text.placeholder { color: #6e6e73; }
    #confirm-btn {
      width: 100%; padding: 14px;
      background: #FF5A00; color: #fff;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    #confirm-btn:disabled {
      background: #3a3a3c; color: #6e6e73; cursor: not-allowed;
    }
    #confirm-btn:not(:disabled):active { transform: scale(0.97); opacity: 0.9; }
    #loading {
      position: absolute; bottom: 150px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff;
      padding: 6px 14px; border-radius: 16px; font-size: 12px;
      z-index: 100; display: none;
    }
  </style>
</head>
<body>

<div id="hint">📍 Нажмите на карте чтобы выбрать адрес</div>
<div id="map"></div>
<div id="loading">Определяю адрес…</div>

<div id="panel">
  <div id="address-box">
    <span id="address-icon">🏠</span>
    <span id="address-text" class="placeholder">Адрес появится после выбора точки</span>
  </div>
  <button id="confirm-btn" disabled>Подтвердить адрес</button>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey=98e9a644-14da-48f9-b740-a886e0b4fa82&lang=ru_RU"></script>
<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  if (tg.colorScheme === 'light') {
    document.body.style.background = '#f2f2f7';
    document.getElementById('panel').style.background = '#f2f2f7';
    document.getElementById('address-box').style.background = '#fff';
  }

  let placemark = null;
  let selectedData = null;

  function setAddress(text, isError) {
    const el = document.getElementById('address-text');
    el.textContent = text;
    el.classList.remove('placeholder');
    el.style.color = isError ? '#ff6b6b' : '#ebebf5cc';
  }

  function handleCoords(coords) {
    document.getElementById('hint').classList.add('hidden');

    if (placemark) {
      placemark.geometry.setCoordinates(coords);
    } else {
      placemark = new ymaps.Placemark(coords, {}, {
        preset: 'islands#redDotIcon',
        draggable: true,
      });
      placemark.events.add('dragend', function () {
        handleCoords(placemark.geometry.getCoordinates());
      });
      map.geoObjects.add(placemark);
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('confirm-btn').disabled = true;
    setAddress('Определяю адрес…', false);

    // Геокодирование без ограничения kind
    ymaps.geocode(coords, { results: 1 })
      .then(function (res) {
        document.getElementById('loading').style.display = 'none';

        const obj = res.geoObjects.get(0);

        if (!obj) {
          // Геокодер вернул 0 результатов — сохраняем координаты
          useCoordsOnly(coords);
          return;
        }

        const components = obj.properties.get(
          'metaDataProperty.GeocoderMetaData.Address.Components'
        ) || [];

        let city = '', street = '', house = '';
        components.forEach(function (c) {
          if (c.kind === 'locality' || c.kind === 'area') city = city || c.name;
          if (c.kind === 'street')  street = c.name;
          if (c.kind === 'house')   house  = c.name;
        });

        // Fallback: берём из строки адреса если компоненты пустые
        if (!city && !street) {
          const line = obj.getAddressLine() || '';
          const parts = line.split(',').map(s => s.trim());
          if (parts.length >= 2) {
            city    = parts[0];
            street  = parts.slice(1).join(', ');
          } else {
            street = line;
          }
        }

        const streetHouse = [street, house].filter(Boolean).join(', ');
        const address = streetHouse || obj.getAddressLine() || '';

        selectedData = { lat: coords[0], lon: coords[1], city, address };

        const display = [city, address].filter(Boolean).join(', ');
        setAddress(display || '📍 Место выбрано', false);
        document.getElementById('confirm-btn').disabled = false;
      })
      .catch(function (err) {
        console.error('Geocode error:', err);
        document.getElementById('loading').style.display = 'none';
        useCoordsOnly(coords);
      });
  }

  function useCoordsOnly(coords) {
    // Если геокодинг не работает — разрешаем отправить координаты
    selectedData = {
      lat:     coords[0],
      lon:     coords[1],
      city:    '',
      address: coords[0].toFixed(6) + ', ' + coords[1].toFixed(6),
    };
    setAddress('📍 Место выбрано (адрес уточните вручную)', false);
    document.getElementById('confirm-btn').disabled = false;
  }

  ymaps.ready(function () {
    window.map = new ymaps.Map('map', {
      center: [44.8951, 37.3168],
      zoom: 12,
      controls: ['zoomControl', 'searchControl'],
    });

    const searchControl = map.controls.get('searchControl');
    searchControl.events.add('resultselect', function () {
      searchControl.getResult(0).then(function (res) {
        const coords = res.geometry.getCoordinates();
        handleCoords(coords);
        map.setCenter(coords, 16);
      });
    });

    map.events.add('click', function (e) {
      handleCoords(e.get('coords'));
    });
  });

  document.getElementById('confirm-btn').addEventListener('click', function () {
    if (!selectedData) return;
    tg.sendData(JSON.stringify(selectedData));
  });
</script>
</body>
</html>
