<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Карта объектов</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    #map { flex: 1; width: 100%; }
    #panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1c1c1e; color: #fff;
      padding: 20px 16px 28px;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
      transform: translateY(110%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      z-index: 200;
    }
    #panel.visible { transform: translateY(0); }
    #panel-price { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    #panel-addr  { font-size: 14px; color: #8e8e93; margin-bottom: 18px; line-height: 1.4; }
    #panel-btn {
      width: 100%; padding: 15px;
      background: #FF5A00; color: #fff;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    #panel-btn:active { transform: scale(0.97); }
    #panel-close {
      position: absolute; top: 14px; right: 16px;
      background: #2c2c2e; border: none; color: #8e8e93;
      width: 30px; height: 30px; border-radius: 50%;
      font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-price"></div>
  <div id="panel-addr"></div>
  <button id="panel-btn" onclick="selectProp()">Смотреть объект →</button>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey=98e9a644-14da-48f9-b740-a886e0b4fa82&lang=ru_RU"></script>
<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  let props = [], highlightId = null, activePropId = null;

  try {
    const d = new URLSearchParams(location.search).get('d');
    if (d) {
      const parsed = JSON.parse(d);
      props       = parsed.props    || [];
      highlightId = parsed.highlight || null;
    } else {
      const h = location.hash.slice(1);
      if (h) {
        const parsed = JSON.parse(decodeURIComponent(h));
        props       = parsed.props    || [];
        highlightId = parsed.highlight || null;
      }
    }
  } catch (e) {}

  // SVG-пузырь с тёмным текстом
  function bubbleSvg(text, isHL) {
    const bg     = isHL  ? '#FF5A00' : '#FFFFFF';
    const fg     = isHL  ? '#FFFFFF' : '#1A1A1A';
    const border = isHL  ? '#FF5A00' : '#1E64DC';
    const cw     = 8;          // ширина символа ~8px при font-size 13
    const w      = Math.max(text.length * cw + 24, 60);
    const h      = 26;
    const tip    = 8;
    const r      = 8;
    const H      = h + tip;
    const svg =
      `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${H}">` +
        `<rect x="1" y="1" width="${w-2}" height="${h-2}" rx="${r}" fill="${bg}" stroke="${border}" stroke-width="2"/>` +
        `<polygon points="${w/2-6},${h-1} ${w/2+6},${h-1} ${w/2},${H-1}" fill="${border}"/>` +
        `<text x="${w/2}" y="${h/2+1}" text-anchor="middle" dominant-baseline="central"` +
        `  fill="${fg}" font-family="Arial,sans-serif" font-size="13" font-weight="bold">${text}</text>` +
      `</svg>`;
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }

  ymaps.ready(function () {
    if (!props.length) return;

    const lats = props.map(p => p.la);
    const lons = props.map(p => p.lo);
    const cLat = (Math.min(...lats) + Math.max(...lats)) / 2;
    const cLon = (Math.min(...lons) + Math.max(...lons)) / 2;

    const map = new ymaps.Map('map', {
      center: [cLat, cLon],
      zoom: 14,
      controls: ['zoomControl'],
    });

    if (props.length > 1) {
      map.setBounds(
        [[Math.min(...lats), Math.min(...lons)],
         [Math.max(...lats), Math.max(...lons)]],
        { checkZoomRange: true, zoomMargin: 60 }
      );
    }

    // Сначала обычные, потом выделенный — чтобы был поверх
    const sorted = [...props].sort((a, b) =>
      (a.i === highlightId ? 1 : 0) - (b.i === highlightId ? 1 : 0)
    );

    sorted.forEach(function (p) {
      const isHL  = (p.i === highlightId);
      const price = p.p.toLocaleString('ru-RU') + ' ₽';
      const w     = Math.max(price.length * 8 + 24, 60);

      const pm = new ymaps.Placemark(
        [p.la, p.lo], {},
        {
          iconLayout:      'default#image',
          iconImageHref:   bubbleSvg(price, isHL),
          iconImageSize:   [w, 34],
          iconImageOffset: [-w / 2, -34],
        }
      );

      pm.events.add('click', function () {
        activePropId = p.i;
        document.getElementById('panel-price').textContent = price + '/сутки';
        document.getElementById('panel-addr').textContent  = p.a || '📍 Адрес не указан';
        document.getElementById('panel').classList.add('visible');
      });

      map.geoObjects.add(pm);
    });

    map.events.add('click', closePanel);
  });

  function closePanel()  { document.getElementById('panel').classList.remove('visible'); }
  function selectProp()  {
    if (activePropId === null) return;
    tg.sendData(JSON.stringify({ prop_id: activePropId }));
  }
</script>
</body>
</html>
